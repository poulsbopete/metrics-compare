# Publishes ONLY the git `slides/` folder to GitHub Pages.
# The Next.js app lives on Vercel — do not add a workflow that uploads `out/` here.
name: GitHub Pages — slides only

on:
  push:
    branches: [main]
    # Run on every push so we replace any stale artifact (e.g. old Next static export).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload slides folder (site root = contents of slides/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides/

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
