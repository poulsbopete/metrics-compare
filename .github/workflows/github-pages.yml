# Deploy the Next.js app as static HTML to GitHub Pages.
# Requirements in repo Settings → Pages: Source = GitHub Actions.
#
# Note: API routes (/api/*) are omitted on Pages (static host only). Use Vercel for full app.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute base path (/{repo} for project sites)
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "BASE_PATH=/${REPO}" >> "$GITHUB_ENV"
          echo "GITHUB_PAGES=true" >> "$GITHUB_ENV"

      - name: Remove API routes (not supported by static export)
        run: rm -rf app/api

      - name: Build static export
        run: npm run build

      - name: Include slides folder (optional)
        run: |
          if [ -d slides ] && [ "$(ls -A slides 2>/dev/null)" ]; then
            mkdir -p out/slides
            cp -r slides/. out/slides/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
